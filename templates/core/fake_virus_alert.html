{% extends 'core/sidebar_base.html' %}
{% block pagecontent %}

<style>

/* centered container */
.desktop-container{

width:800px;
margin:auto;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.5);

}

/* windows 10 bar */
.win-bar{

background:#0078d7;
color:white;
padding:8px;
font-size:14px;

}

/* desktop */
.desktop{

background:url("https://wallpaperaccess.com/full/317501.jpg");
background-size:cover;
height:450px;
position:relative;

}

/* alert popup */
.alert-box{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
background:white;
border-radius:6px;
box-shadow:0 0 30px rgba(0,0,0,0.7);
display:none;

}

/* alert title */
.alert-title{

background:red;
color:white;
padding:10px;
font-weight:bold;

}

/* alert body */
.alert-body{

padding:20px;
color:black;
font-size:16px;

}

/* blink effect */
.blink{

animation:blink 1s infinite;

}

@keyframes blink{

50%{opacity:0.3;}

}

</style>



<div class="desktop-container">

<div class="win-bar">
Windows 10 — Desktop
</div>


<div class="desktop">

<div id="virusAlert" class="alert-box blink">

<div class="alert-title">
⚠ Windows Security Alert
</div>

<div class="alert-body">

Your computer has been infected with Trojan Virus!

Immediate action required.

Files are being damaged.

</div>

</div>

</div>

</div>


<div class="text-center mt-3">

<button class="btn btn-danger"
onclick="triggerAlert()">
Open File
</button>

<a href="{% url 'secret_zone' %}"
class="btn btn-outline-light">
Back
</a>

</div>



<script>

function triggerAlert(){

setTimeout(function(){

document.getElementById("virusAlert").style.display="block";

},500);

}

</script>

{% endblock %}
