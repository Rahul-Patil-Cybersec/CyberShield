{% extends 'core/sidebar_base.html' %}
{% block pagecontent %}

<style>

/* ===== PAGE HEADER ===== */

.quiz-header{

text-align:center;
margin-bottom:50px;

}

.quiz-header h1{

color:#00f5ff;
font-size:34px;
font-weight:700;
letter-spacing:1px;

text-shadow:
0 0 10px #00f5ff,
0 0 20px rgba(0,245,255,0.5);

}

.quiz-header p{

color:#94a3b8;
font-size:16px;

}


/* ===== GRID ===== */

.quiz-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:25px;

}


/* ===== CARD ===== */

.quiz-card{

background:linear-gradient(
145deg,
#020617,
#0f172a
);

border:1px solid rgba(0,245,255,0.3);

border-radius:16px;

padding:28px;

transition:0.3s;

position:relative;

overflow:hidden;

}


/* glow hover */

.quiz-card:hover{

transform:translateY(-8px);

border-color:#00ff9f;

box-shadow:

0 0 10px #00ff9f,
0 0 25px rgba(0,255,159,0.5);

}


/* title */

.quiz-title{

color:#00ff9f;

font-size:18px;

font-family:monospace;

margin-bottom:18px;

}


/* description */

.quiz-desc{

color:#94a3b8;

font-size:14px;

margin-bottom:20px;

}


/* button */

.quiz-btn{

width:100%;

background:linear-gradient(
45deg,
#00f5ff,
#00ff9f
);

border:none;

padding:10px;

border-radius:10px;

font-weight:bold;

color:#020617;

transition:0.3s;

}

.quiz-btn:hover{

box-shadow:

0 0 15px #00ff9f,
0 0 30px rgba(0,255,159,0.6);

}


/* glow animation line */

.quiz-card::before{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:2px;

background:linear-gradient(
90deg,
transparent,
#00ff9f,
transparent
);

transition:0.5s;

}

.quiz-card:hover::before{

left:100%;

}

</style>



<div class="container-fluid">

<!-- HEADER -->

<div class="quiz-header">

<h1>Security Quiz Dashboard</h1>

<p>Select a topic and test your cybersecurity awareness</p>

</div>



<!-- GRID -->

<div class="quiz-grid">

{% for topic in topics %}

<div class="quiz-card">

<div class="quiz-title">

{{ topic.name }}

</div>

<div class="quiz-desc">

Test your knowledge about {{ topic.name }}

</div>

<a href="{% url 'quiz_page' topic.id %}">

<button class="quiz-btn">

START QUIZ

</button>

</a>

</div>

{% endfor %}

</div>


</div>

{% endblock %}
